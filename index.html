<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Flower Garden ✿</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="web.js" defer></script>
</head>
<body>
    <div id="welcomeScreen" class="welcome-overlay-bg">
        <div class="welcome-content">
            <img src="Logo เพลง.png" alt="ดอกไม้ - Home" class="welcome-logo">
            
            <button class="welcome-start-btn" onclick="enterGarden()">
                <img src="ปลูกดอกไม้.png" alt="ไปปลูกดอกไม้กันเลย" class="btn-image">
            </button>
        </div>
    </div>

    <button id="audioBtn" class="audio-toggle-btn hidden" onclick="toggleMusic()">
        <img id="audioIcon" src="เปิดเสียง.png" alt="Toggle Sound">
    </button>

    <div class="scroll-container">
        <div class="game-world">
    
            <div class="main-menu-zone">
                <div class="song-title">ดอกไม้ - Home <span style="font-size: 18px; font-weight: normal;">(Feat. Samatong)</span> ✿</div>
                
                <div id="mainMenu" class="menu-card">
                    <button class="close-card-btn" onclick="closeMainMenu()">✕</button>
                    
                    <button class="menu-item" onclick="startPlantingMode()">
                    <div class="icon-placeholder">
                        <img src="เลือกดอกไม้2.png" alt="ปลูกดอกไม้" class="menu-icon">
                    </div>
                </button>

                <button class="menu-item">
                    <div class="icon-placeholder">
                        <img src="ฟังเพลง.png" alt="ฟังเพลง" class="menu-icon">
                    </div>
                </button>

                <button class="menu-item">
                    <div class="icon-placeholder">
                        <img src="ติดตาม.png" alt="ติดตามศิลปิน" class="menu-icon">
                    </div>
                </button>
                </div>
            </div>

            <div id="plantingIntroCard" class="planting-card-zone card-hidden">
                <button class="close-card-btn" onclick="backToMainMenu()">✕</button>
                
                <div style="display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 100%;" onclick="closePlantingIntro()">
                    <img src="1.png" alt="Flower Asset" style="width: 95px; height: auto;">
                    <h2 style="font-size: 52px; font-weight: 700; color: #2d2d2d; margin-top: 8px; text-align: center;">ปลูกดอกไม้</h2>
                </div>
            </div>

            <div id="counterCard" class="counter-card" style="display: inline-flex; align-items: center; justify-content: center; gap: 12px; padding: 10px 20px;">
                <button style="position: absolute; top: -10px; left: -10px; background: #f3706c; border: none; color: #ffffff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; font-weight: bold; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.15); transition: transform 0.1s;" 
                    onclick="closeCounter()"
                    onmouseover="this.style.transform='scale(1.1)'" 
                    onmouseout="this.style.transform='scale(1)'">✕</button>
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <span style="font-size: 14px; color: #4a4a4a; font-weight: 500;">คุณปลูกดอกไม้ ดอกที่...</span>
                    <div class="counter-images-group" style="display: flex; align-items: center; gap: 6px;">
                        <img src="Icon ต้นโคลเวอร์.png" alt="Flower 11" style="width: 28px; height: 28px; object-fit: contain;">
                        <img src="Icon เดซี่.png" alt="Flower 3" style="width: 28px; height: 28px; object-fit: contain;">
                        <img src="Icon ทิวลิป.png" alt="Flower 2" style="width: 28px; height: 28px; object-fit: contain;">
                        <img src="Icon ทานตะวัน.png" alt="Flower 1" style="width: 28px; height: 28px; object-fit: contain;">
                    </div>
                </div>
            </div>

            <div class="dirt-patch-zone"></div>

        </div>
    </div>
    <audio id="bgMusic" src="FAH_Flower_BKT.mp3" preload="auto" loop hidden></audio>
</body>
</html>
