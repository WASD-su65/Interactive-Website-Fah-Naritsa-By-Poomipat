<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Flower Garden ✿</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="web.js" defer></script>
</head>
<body>

    <div class="scroll-container">
        <div class="game-world">
            
            <button class="audio-toggle-btn">🔊</button>

            <div id="mainMenu" class="main-menu-zone">
                <div class="song-title">ดอกไม้ - Home <span style="font-size: 18px; font-weight: normal;">(Feat. Samatong)</span> ✿</div>
                
                <div class="menu-card">
                    <button class="close-card-btn" onclick="closeMainMenu()">✕</button>
                    
                    <button class="menu-item" onclick="startPlantingMode()">
                        <div class="icon-placeholder">🌱</div>
                        <span>ปลูกดอกไม้</span>
                    </button>
                    <button class="menu-item">
                        <div class="icon-placeholder">🎧</div>
                        <span>ฟังเพลง</span>
                    </button>
                    <button class="menu-item">
                        <div class="icon-placeholder">✨</div>
                        <span>ติดตามศิลปิน</span>
                    </button>
                </div>
            </div>

            <div id="plantingIntroCard" class="planting-card-zone card-hidden">
                <button class="close-card-btn" onclick="backToMainMenu()">✕</button>
                
                <div style="display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 100%;" onclick="closePlantingIntro()">
                    <img src="1.png" alt="Flower Asset" style="width: 95px; height: auto;">
                    <h2 style="font-size: 52px; font-weight: 700; color: #2d2d2d; margin-top: 8px; text-align: center;">ปลูกดอกไม้</h2>
                </div>
            </div>

            <div id="counterCard" class="counter-card" style="display: inline-flex; align-items: center; justify-content: center; gap: 12px; padding: 10px 20px;">
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <span style="font-size: 14px; color: #4a4a4a; font-weight: 500;">คุณปลูกดอกไม้ ดอกที่...</span>
                    <div class="counter-images-group" style="display: flex; align-items: center; gap: 6px;">
                        <img src="3.png" alt="Flower 3" style="width: 22px; height: 22px; object-fit: contain;">
                        <img src="1.png" alt="Flower 1" style="width: 22px; height: 22px; object-fit: contain;">
                        <img src="9.png" alt="Flower 9" style="width: 22px; height: 22px; object-fit: contain;">
                        <img src="7.png" alt="Flower 7" style="width: 22px; height: 22px; object-fit: contain;">
                    </div>
                </div>
                <button style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; font-size: 14px; margin-left: 4px; padding: 0 2px;" onclick="closeCounter()">✕</button>
            </div>

            <div class="dirt-patch-zone"></div>

        </div>
    </div>

</body>
</html>
